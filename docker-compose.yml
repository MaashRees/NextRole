# ======================================================================
# NextRole — Mode Développement LOCAL
# Lance tout en local : app + bases de données + MinIO + Airflow
#
# Usage :
#   cp .env.example .env   # puis éditez les valeurs
#   docker compose up --build -d
# ======================================================================

version: '3.8'

services:

  # --------------------------------------------------------------------
  # BASE DE DONNÉES APPLICATIVE
  # --------------------------------------------------------------------
  mongodb:
    image: mongo:6.0
    container_name: nextrole_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${DB_NAME}
    ports:
      # Exposé uniquement en local pour accès via Compass, etc.
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - nextrole_local
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------
  # BACKEND NODE.JS / EXPRESS
  # --------------------------------------------------------------------
  backend:
    build: ./backend
    container_name: nextrole_backend
    restart: unless-stopped
    # Port décalé sur 3005 pour ne pas conflictuer avec un dev server local :3000
    ports:
      - "3005:3000"
    environment:
      APP_PORT: ${APP_PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      # DB_HOST pointe vers le nom du service MongoDB dans ce réseau
      DB_HOST: mongodb
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SALT_ROUNDS: ${SALT_ROUNDS}
      BASE_AVATAR_URL: ${BASE_AVATAR_URL}
      MINIO_ENDPOINT: minio
      MINIO_PORT: ${MINIO_PORT}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - nextrole_local

  # --------------------------------------------------------------------
  # FRONTEND REACT / NGINX
  # --------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
    environment:
      VITE_BACKEND_URI: ${VITE_BACKEND_URI}
    container_name: nextrole_frontend
    restart: unless-stopped
    ports:
      # Port décalé sur 5174 pour ne pas conflictuer avec `npm run dev` :5173
      - "5174:80"
    depends_on:
      - backend
    networks:
      - nextrole_local

  # --------------------------------------------------------------------
  # DATA LAKE — MinIO (S3-compatible)
  # --------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: nextrole_minio
    restart: unless-stopped
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    networks:
      - nextrole_local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3

  # --------------------------------------------------------------------
  # MÉTADONNÉES AIRFLOW — PostgreSQL
  # --------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: nextrole_postgres
    restart: unless-stopped
    ports:
      - "${AIRFLOW_DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nextrole_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------
  # AIRFLOW — Configuration commune (Anchors)
  # --------------------------------------------------------------------
  x-airflow-common: &airflow-common
    build: ./datalake/airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # Chaîne de connexion PostgreSQL
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${JWT_SECRET}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      # Auto-provisioning de l'utilisateur admin (Airflow 3.0)
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      _AIRFLOW_WWW_USER_CREATE_IF_NOT_EXISTS: "true"
      AIRFLOW__WEBSERVER__RBAC: "true"
      # Variables OCR Azure
      AZURE_OCR_ENDPOINT: ${AZURE_OCR_ENDPOINT}
      AZURE_OCR_KEY: ${AZURE_OCR_KEY}
      AZURE_OCR_MODEL: ${AZURE_OCR_MODEL}
      # Accès MinIO depuis les DAGs
      MINIO_ENDPOINT: minio
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      # Accès MongoDB depuis les DAGs
      DB_HOST: mongodb
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
    volumes:
      - ./datalake/airflow/dags:/opt/airflow/dags
      - ./datalake/airflow/logs:/opt/airflow/logs
      - ./datalake/airflow/plugins:/opt/airflow/plugins
      - airflow_logs:/opt/airflow/logs
    networks:
      - nextrole_local
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      minio:
        condition: service_started

  # Initialisation d'Airflow (Migration DB + Création User)
  airflow-init:
    <<: *airflow-common
    container_name: nextrole_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        echo "Airflow DB migration completed"

  # Webserver (Interface graphique / API Server in Airflow 3)
  airflow-webserver:
    <<: *airflow-common
    container_name: nextrole_airflow_webserver
    command: api-server
    ports:
      - "${AIRFLOW_PORT}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Scheduler (Exécution des DAGs)
  airflow-scheduler:
    <<: *airflow-common
    container_name: nextrole_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

# ======================================================================
# VOLUMES PERSISTANTS (locaux uniquement)
# ======================================================================
volumes:
  mongodb_data:
    driver: local
  minio_data:
    driver: local
  postgres_data:
    driver: local
  airflow_logs:
    driver: local

# ======================================================================
# RÉSEAU INTERNE (local uniquement)
# ======================================================================
networks:
  nextrole_local:
    driver: bridge