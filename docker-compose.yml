version: '3.8'

services:
  backend:
    build: ./backend
    container_name: nextrole_backend
    ports:
      - "3005:3000"
    environment:
      - FRONTEND_URL=${FRONTEND_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - SALT_ROUNDS=${SALT_ROUNDS}
      - BASE_AVATAR_URL=${BASE_AVATAR_URL}
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URI=${VITE_BACKEND_URI}
    container_name: nextrole_frontend
    ports:
      # Mappe le port Nginx (80) sur le 5174 du host pour éviter les conflits
      - "5174:80"
    depends_on:
      - backend
    restart: always
