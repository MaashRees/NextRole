# ======================================================================
# NextRole — Mode PRODUCTION — Services applicatifs
#
# Ce fichier ne contient QUE le frontend et le backend.
# Les bases de données et le data lake sont gérés séparément
# dans infra-prod.yml et rejoints via le réseau Docker externe "infra-network".
#
# Pré-requis sur le VPS :
#   1. Le réseau externe doit exister : docker network create infra-network
#   2. infra-prod.yml doit être démarré et les services y être connectés
#
# Usage :
#   docker compose -f docker-compose.prod.yml up -d
# ======================================================================

version: '3.8'

services:

  # --------------------------------------------------------------------
  # BACKEND NODE.JS / EXPRESS
  # --------------------------------------------------------------------
  backend:
    # Option A : construire depuis les sources sur le VPS
    build: ./backend
    # Option B : tirer l'image depuis Docker Hub (décommenter si push fait)
    # image: seerm/nextrole-backend:latest
    container_name: nextrole_backend_prod
    restart: always
    # Port lié uniquement sur localhost — nginx gère l'accès public
    ports:
      - "127.0.0.1:3005:3000"
    environment:
      APP_PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL}
      # Pointe vers les services de l'infrastructure partagée (infra-prod.yml)
      DB_HOST: mongodb-prod
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SALT_ROUNDS: ${SALT_ROUNDS}
      BASE_AVATAR_URL: ${BASE_AVATAR_URL}
      MINIO_ENDPOINT: minio-prod
      MINIO_PORT: ${MINIO_PORT}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - infra-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --------------------------------------------------------------------
  # FRONTEND REACT / NGINX
  # --------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
    environment:
      VITE_BACKEND_URI: ${VITE_BACKEND_URI}
    # image: seerm/nextrole-frontend:latest
    container_name: nextrole_frontend_prod
    restart: always
    ports:
      - "127.0.0.1:5174:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
    networks:
      - infra-network

# ======================================================================
# RÉSEAU EXTERNE PARTAGÉ
# Doit être créé manuellement une fois sur le VPS :
#   docker network create infra-network
# ======================================================================
networks:
  infra-network:
    external: true
    name: ${INFRA_NETWORK:-infra-network}